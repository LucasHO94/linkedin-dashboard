<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPost — Controle Remoto</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0077b5; --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
        }
        body {
            font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .container {
            background: var(--card); padding: 2rem; border-radius: 24px; width: 90%; max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-weight: 600; margin-bottom: 0.5rem; color: var(--primary); }
        p { opacity: 0.7; font-size: 0.9rem; margin-bottom: 2rem; }
        
        .btn-post {
            background: linear-gradient(135deg, #0077b5 0%, #00a0dc 100%);
            color: white; border: none; padding: 1.2rem 2rem; border-radius: 16px;
            font-size: 1.1rem; font-weight: 600; cursor: pointer; width: 100%;
            box-shadow: 0 10px 15px -3px rgba(0,119,181,0.4);
            transition: all 0.3s ease;
        }
        .btn-post:active { transform: scale(0.95); }
        .btn-post:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-feed {
            margin-top: 2rem; text-align: left; background: rgba(0,0,0,0.2);
            padding: 1rem; border-radius: 12px; font-size: 0.8rem;
        }
        .status-item { 
            display: flex; justify-content: space-between; padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .status-badge { 
            padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.7rem;
        }
        .pending { background: #ca8a04; color: #fff; }
        .done { background: #16a34a; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AutoPost</h1>
    <p>Controle Remoto do LinkedIn Bot</p>

    <button id="postBtn" class="btn-post">Publicar Agora</button>

    <div class="status-feed" id="feed">
        <div style="text-align:center">Carregando comandos...</div>
    </div>
</div>

<script>
    // --- CONFIGURAÇÃO (O Antigravity preencheu para você) ---
    const SUPABASE_URL = "https://pumqpplzflfzknqqrkdy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_eChooowGIuw8JwllkoU4kw_4FSYYJku";
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const postBtn = document.getElementById('postBtn');
    const feed = document.getElementById('feed');

    // Função para enviar o comando
    postBtn.onclick = async () => {
        postBtn.disabled = true;
        postBtn.innerText = "Enviando sinal...";

        const { error } = await supabase
            .from('automation_commands')
            .insert([{ command: 'post_now', status: 'pending' }]);

        if (error) alert("Erro ao enviar: " + error.message);
        else {
            setTimeout(() => {
                postBtn.disabled = false;
                postBtn.innerText = "Publicar Agora";
            }, 2000);
        }
    };

    // Função para buscar e mostrar o histórico
    async function updateFeed() {
        const { data, error } = await supabase
            .from('automation_commands')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(5);

        if (data) {
            feed.innerHTML = data.map(item => `
                <div class="status-item">
                    <span>${item.command}</span>
                    <span class="status-badge ${item.status}">${item.status.toUpperCase()}</span>
                </div>
            `).join('') || "Sem comandos recentes.";
        }
    }

    // Atualiza a cada 5 segundos
    setInterval(updateFeed, 5000);
    updateFeed();
</script>

</body>
</html>
