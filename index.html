<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Bot — Editorial Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #0077b5;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --text: #f1f5f9; --text-dim: #94a3b8;
        }
        body {
            font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text);
            margin: 0; padding: 20px; line-height: 1.5; min-height: 100vh;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { 
            background: linear-gradient(135deg, var(--primary), #00a0dc);
            width: 45px; height: 45px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }

        .stats-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card); padding: 15px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-value { font-size: 1.8rem; font-weight: 600; }

        .action-center {
            background: var(--card); padding: 25px; border-radius: 20px;
            margin-bottom: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .btn {
            color: white; border: none; padding: 12px 25px; border-radius: 12px;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: inline-flex; align-items: center; gap: 10px;
        }
        .btn-generate { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .btn-view { background: #334155; padding: 5px 10px; font-size: 0.8rem; }
        .btn-post-row { background: var(--success); padding: 5px 12px; font-size: 0.8rem; }
        .btn-delete-row { background: var(--danger); padding: 5px 12px; font-size: 0.8rem; margin-left: 5px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .table-container { 
            background: var(--card); border-radius: 15px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.2); padding: 12px; text-align: left; font-size: 0.75rem; color: var(--text-dim); }
        td { padding: 12px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .badge.pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .badge.posted { background: rgba(16, 185, 129, 0.1); color: var(--success); }

        /* Modal */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: var(--card); padding: 30px; border-radius: 20px; max-width: 600px;
            width: 100%; max-height: 80vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1);
        }
        .close-btn { float: right; cursor: pointer; color: var(--text-dim); }
    </style>
</head>
<body>

<div id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></span>
        <h3>Rascunho do Post</h3>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
        <div id="modal-text" style="white-space: pre-wrap; font-size: 0.95rem;"></div>
    </div>
</div>

<div class="container">
    <header>
        <div class="logo">
            <div class="logo-icon"><i class="fa-solid fa-pen-nib"></i></div>
            <h1 style="margin:0; font-size: 1.2rem;">LinkedIn Editorial</h1>
        </div>
        <div id="connection-status" style="font-size: 0.7rem; color: var(--success);">● Supabase Conectado</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Pendentes</div>
            <div class="stat-value" id="stat-pending">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Publicados</div>
            <div class="stat-value" id="stat-posted">0</div>
        </div>
    </div>

    <div class="action-center">
        <button id="generateBtn" class="btn btn-generate">
            <i class="fa-solid fa-magic-wand-sparkles"></i> Gerar Sugestão pela IA
        </button>
        <p style="font-size: 0.8rem; color: var(--text-dim); margin-top: 10px;">
            Inicia análise do seu Feed (Top 10) e cria um post humano.
        </p>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>TEMA PREVISTO</th>
                    <th>STATUS</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="posts-body"></tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://pumqpplzflfzknqqrkdy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_eChooowGIuw8JwllkoU4kw_4FSYYJku";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allPosts = [];

    const generateBtn = document.getElementById('generateBtn');

    generateBtn.onclick = async () => {
        generateBtn.disabled = true;
        const oldText = generateBtn.innerHTML;
        generateBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Solicitando...';
        await supabaseClient.from('automation_commands').insert([{ command: 'generate_post', status: 'pending' }]);
        setTimeout(() => { generateBtn.disabled = false; generateBtn.innerHTML = oldText; }, 3000);
    };

    function showPost(id) {
        const post = allPosts.find(p => p.id === id);
        if (post) {
            document.getElementById('modal-text').innerText = post.text;
            document.getElementById('modal').style.display = 'flex';
        }
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function publishPost(id) {
        if (!confirm("Confirmar postagem manual no LinkedIn?")) return;
        await supabaseClient.from('automation_commands').insert([{ command: `publish_post:${id}`, status: 'pending' }]);
        alert("Comando enviado!");
    }

    async function deletePost(id) {
        if (!confirm("Remover rascunho?")) return;
        await supabaseClient.from('posts_queue').delete().eq('id', id);
        refreshData();
    }

    async function refreshData() {
        const { data: posts } = await supabaseClient.from('posts_queue').select('*').order('created_at', { ascending: false }).limit(10);
        if (posts) {
            allPosts = posts;
            document.getElementById('stat-pending').innerText = posts.filter(p => p.status === 'pending').length;
            document.getElementById('stat-posted').innerText = posts.filter(p => p.status === 'posted').length;

            document.getElementById('posts-body').innerHTML = posts.map(p => `
                <tr>
                    <td>
                        <div style="font-weight:600">${p.topic || 'Sem tema'}</div>
                        <div style="font-size:0.7rem; color:var(--text-dim)">${new Date(p.created_at).toLocaleTimeString()}</div>
                    </td>
                    <td><span class="badge ${p.status}">${p.status.toUpperCase()}</span></td>
                    <td>
                        <button class="btn btn-view" onclick="showPost(${p.id})"><i class="fa-solid fa-eye"></i></button>
                        ${p.status === 'pending' ? `
                            <button class="btn btn-post-row" onclick="publishPost(${p.id})"><i class="fa-solid fa-rocket"></i></button>
                        ` : ''}
                        <button class="btn btn-delete-row" onclick="deletePost(${p.id})"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }
    }

    setInterval(refreshData, 5000);
    refreshData();
</script>
</body>
</html>
